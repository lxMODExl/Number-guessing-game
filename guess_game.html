<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Number Guessing Game</title>
        <script src="script.js"></script>
        <style>
            body {
                font-family: Arial, sans-serif;
                color: white;
                background-color: rgb(78, 78, 78);
                text-align: center;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;

            }
            .container {
                font-size: 20px;
            }
            .game {
                border: 1px solid black;
                border-radius: 64px;
                color: white;
                padding: 16px 32px;
                display: inline-block;
                margin: 4px 2px;
                background-color: rgb(117, 117, 117);
                box-shadow: 0 0 15px 0 #00ffffa4;
            }

            h1 {
                background: linear-gradient(180deg, #00ffff, #ffffff);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .button {
                border: 1px hidden black;
                border-radius: 32px;
                color: black;
                background-color: cyan;
                padding: 16px 32px;
                font-size: 16px;
                margin: 4px 2px;
                box-shadow: 0 4px 8px 0 rgb(66, 66, 66);
            }

            .start-button {
                background: linear-gradient(180deg, #00ffff, #ffffff);
                color: black;
                cursor: pointer;
                transition: transform 0.3s ease-in-out;
            }

            .start-button:hover {
                background-color: #777;
                color: black;
                transform: scale(1.2);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="game">
                <h1>Number Guessing Game</h1>
                <p>Guess the number<br>between 1 and 10.</p>
                <p>You have 3 attempts.</p>
                
                <button type="button" class="button start-button" onclick="startGame()">Start Game</button>
            </div>
        </div>
    </body>
</html>
